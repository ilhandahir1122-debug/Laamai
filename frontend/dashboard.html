<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — LAAM AI</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="bg-grid"></div>
<div class="glow-a"></div>
<div class="glow-b"></div>

<nav>
  <a href="index.html" class="nav-brand">
    <img src="assets/logo.jpg" alt="LAAM AI">
    <span>LAAM AI</span>
  </a>
  <div class="nav-links">
    <a href="create-token.html">Create Token</a>
    <a href="liquidity.html">Liquidity</a>
    <a href="revoke.html">Revoke</a>
    <a href="dashboard.html">Dashboard</a>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <a class="nav-cta" href="index.html">← Back to Site</a>
  </div>
</nav>

<main class="app-main">
  <div class="app-head">
    <span class="stag">Your Wallet</span>
    <h1>Token Dashboard</h1>
    <p>Every SPL token your connected wallet holds, pulled live from Solana mainnet-beta.</p>
  </div>

  <div class="app-nav-links">
    <a href="create-token.html">Create Token</a>
    <a href="liquidity.html">Add Liquidity</a>
    <a href="revoke.html">Revoke Authority</a>
    <a href="dashboard.html" class="active">Dashboard</a>
  </div>

  <div class="wallet-bar">
    <div class="wallet-status">
      <span class="wallet-dot" data-wallet-dot></span>
      <span data-wallet-addr>Not connected</span>
    </div>
    <button class="btn-wallet" data-wallet-connect>Connect Wallet</button>
  </div>

  <div class="token-table" id="dashboardTokens">
    <div class="empty-state">Connect your wallet to see your tokens.</div>
  </div>
</main>

<script src="js/wallet.js"></script>
<script src="js/app.js"></script>
</body>
</html>
